<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Insights</title>
<style>
body {
  background:#f8faf5;
  font-family:sans-serif;
  margin:0;
  padding:0;
  color:#222;
  text-align:center;
}
.container {
  max-width:800px;
  margin:100px auto;
  padding:20px;
}

/* Headline */
h1 {
  color:#065f46;
  font-size:4rem;
  margin-bottom:25px;
}

/* Subtext */
p {
  font-size:1.6rem;
  margin:15px 0;
  color:#333;
  line-height:1.8;
}

/* Assessment Button */
#assessmentBtn {
  margin-top:40px;
  padding:18px 40px;
  font-size:1.5rem;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#b0e0c8;
  color:#065f46;
  transition:0.2s;
}
#assessmentBtn:hover {
  background:#9dd4b0;
}

/* Responsive */
@media screen and (max-width:768px){
  h1 { font-size:2.8rem; }
  p { font-size:1.3rem; }
  #assessmentBtn { font-size:1.2rem; padding:15px 30px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Welcome to Mind Insights</h1>
  <p>It’s an assessment tool</p>
  <p><strong>Why check your stress?</strong><br>Understanding your stress levels helps you manage your mental health effectively.</p>
  <button id="assessmentBtn" onclick="window.location.href='assessment.html'">Take Assessment</button>
</div>
</body>
</html>
