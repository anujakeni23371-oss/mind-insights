<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress Assessment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<a href="index.html">Home</a>
<a href="assessment.html">Assessment</a>
</nav>

<section class="home">

<h1>Stress Assessment</h1>

<!-- Name input -->

<div id="start-screen">

<p>Enter your name (optional)</p>

<input type="text" id="username" placeholder="Your name">

<br><br>

<button class="assessment-btn" onclick="startQuiz()">Start Assessment</button>

</div>

<!-- Progress bar -->

<div class="progress-container" style="display:none;" id="progress-container">
<div id="progress-bar"></div>
</div>

<!-- Quiz -->

<div id="quiz-container" style="display:none;">

<h2 id="question"></h2>

<div id="answers"></div>

</div>

<!-- Result -->

<div id="result" style="display:none;">

<h2 id="score"></h2>

<h3 id="stress-level"></h3>

<p id="tip"></p>

<br>

<button onclick="restartQuiz()" class="assessment-btn">
Re-Assessment
</button>

<a href="index.html" class="assessment-btn">
Home Page
</a>

</div>

</section>

<!-- Small disclaimer -->

<p style="position:fixed;bottom:10px;right:10px;font-size:12px;color:#777;">
For stress awareness only. Not a medical diagnosis.
</p>

<script>

const questions = [

{q:"How often do you feel overwhelmed?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you have trouble sleeping because of worries?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you feel tired even after resting?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you find it difficult to concentrate?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you feel irritated easily?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you feel pressure from work or studies?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you feel anxious without clear reason?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you overeat or skip meals when stressed?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you feel mentally exhausted?", a:["Never","Sometimes","Often","Always"]},

{q:"Do you struggle to relax?", a:["Never","Sometimes","Often","Always"]}

];

let currentQuestion = 0;
let score = 0;
let userName = "";

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressBar = document.getElementById("progress-bar");

function startQuiz(){

userName = document.getElementById("username").value;

document.getElementById("start-screen").style.display="none";
document.getElementById("quiz-container").style.display="block";
document.getElementById("progress-container").style.display="block";

showQuestion();

}

function showQuestion(){

const q = questions[currentQuestion];

questionEl.textContent = q.q;

answersEl.innerHTML = "";

q.a.forEach((answer,index)=>{

const btn = document.createElement("button");

btn.textContent = answer;
btn.classList.add("assessment-btn");

btn.onclick = () => {

score += index;

currentQuestion++;

updateProgress();

if(currentQuestion < questions.length){

showQuestion();

}else{

showResult();

}

};

answersEl.appendChild(btn);

});

}

function updateProgress(){

let progress = (currentQuestion / questions.length) * 100;

progressBar.style.width = progress + "%";

}

function showResult(){

document.getElementById("quiz-container").style.display="none";
document.getElementById("result").style.display="block";

let level="";
let tip="";

if(score <=10){

level="Low Stress";
tip="Keep maintaining healthy habits like sleep, exercise, and relaxation.";

}

else if(score <=20){

level="Moderate Stress";
tip="Take breaks, practice breathing exercises, and manage your workload.";

}

else{

level="High Stress";
tip="Consider talking to someone you trust and prioritize rest and self-care.";

}

let nameText = userName ? userName + ", " : "";

document.getElementById("score").textContent =
nameText + "your score is " + score;

document.getElementById("stress-level").textContent =
"Stress Level: " + level;

document.getElementById("tip").textContent =
"Tip: " + tip;

}

function restartQuiz(){

currentQuestion = 0;
score = 0;

document.getElementById("result").style.display="none";
document.getElementById("quiz-container").style.display="block";

updateProgress();
showQuestion();

}

</script>

</body>
</html>
