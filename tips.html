<!DOCTYPE html>
<html>
<head>
  <title>Mind Insights - Tips</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Menu -->
  <nav>
    <a href="index.html">Home</a> |
    <a href="assessment.html">Assessment</a> |
    <a href="tips.html">Tips</a>
  </nav>

  <h1>Your Stress Tips</h1>

  <div id="tipsContent">
    <h2>Your Stress Level</h2>
    <p id="stressMessage"></p>
    <a href="index.html"><button>Back to Home</button></a>
  </div>

  <script>
    // Read score from localStorage
    const score = parseInt(localStorage.getItem('stressScore'));
    const msg = document.getElementById('stressMessage');

    if (score <= 13) {
      msg.textContent = "Low Stress: Keep up your healthy habits and continue monitoring your stress regularly.";
    } else if (score <= 23) {
      msg.textContent = "Moderate Stress: Try relaxation techniques like deep breathing, short walks, or light exercise.";
    } else {
      msg.textContent = "High Stress: Consider talking to a counselor, practicing mindfulness, and taking breaks from stressful activities.";
    }
  </script>
</body>
</html>
